name: Build and Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      EDGEONE_PROJECT_NAME: image-host

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build project
        run: pnpm build

      - name: Prepare EdgeOne bundle
        run: |
          cp package.json dist/package.json
          cp -R node-functions dist/node-functions

      - name: Deploy to EdgeOne Pages
        run: npx edgeone@latest pages deploy ./dist -n "$EDGEONE_PROJECT_NAME" -t "${{ secrets.EDGEONE_API_TOKEN }}"
